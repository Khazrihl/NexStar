name: Galaxy dump

# Runs nl_dumper.py against the Nexus Legacy API using a token stored as a
# repository secret, then commits the refreshed map/nexus-map-clean.json back
# to main if it changed. Two cadences:
#   * 07:00 UTC daily (= 2 AM US Central, CDT) -> full dump (all_planets=True)
#   * every other hour on the hour            -> incremental delta merge
#     (loads committed map as baseline, only re-fetches systems whose summary
#      changed since the last run).
#
# NOTE: GitHub cron is fixed-offset UTC and does NOT follow DST. 08:00 UTC is
# 3 AM during US Central Daylight Time and 2 AM during Standard Time.

on:
  schedule:
    - cron: '0 7 * * *'          # 07:00 UTC (2 AM CT, CDT) — full dump
    # Hourly delta is triggered from the VPS bot via workflow_dispatch
    # (GitHub high-frequency cron is unreliable); see GALAXY_DISPATCH_* in the bot.
  workflow_dispatch:
    inputs:
      full:
        description: 'Full dump (--full, all_planets=True) instead of incremental delta'
        type: boolean
        default: false

permissions:
  contents: write       # only used to push the refreshed JSON back to this repo

concurrency:
  group: galaxy-dump    # full + delta share one group so they never overlap
  cancel-in-progress: false

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Write nl_config.txt from secret
        env:
          # A live Nexus Legacy session JWT (the `nexus_token` cookie). The
          # dumper sees the galaxy from this account's POV, so a leader account
          # with broad scout coverage gives the best file.
          NEXUS_TOKEN: ${{ secrets.NEXUS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NEXUS_TOKEN:-}" ]; then
            echo "::error::Secret NEXUS_TOKEN is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          printf 'token=%s\n' "$NEXUS_TOKEN" > map/nl_config.txt

      - name: Run dumper
        working-directory: map
        run: |
          set -euo pipefail
          if [ "${{ github.event.schedule }}" = '0 8 * * *' ] || [ "${{ github.event.inputs.full }}" = 'true' ]; then
            echo "Full dump"
            python nl_dumper.py --full
          else
            echo "Incremental delta run"
            python nl_dumper.py --delta
          fi

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "nexstar-galaxy-bot[bot]"
          git config user.email "actions@users.noreply.github.com"
          # Never commit the token file.
          rm -f map/nl_config.txt
          git add map/nexus-map-clean.json
          if git diff --cached --quiet -- map/nexus-map-clean.json; then
            echo "Galaxy unchanged since last sync; nothing to commit."
            exit 0
          fi
          systems=$(jq -r '.meta.systemCount // 0' map/nexus-map-clean.json)
          captured=$(jq -r '.meta.capturedAt // "unknown"' map/nexus-map-clean.json)
          if [ "${{ github.event.schedule }}" = '0 8 * * *' ] || [ "${{ github.event.inputs.full }}" = 'true' ]; then
            kind="full"
          else
            kind="delta"
          fi
          git commit -m "Galaxy dump ${kind} (${systems} systems, ${captured})"
          git push
