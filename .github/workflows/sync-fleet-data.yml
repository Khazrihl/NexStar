name: Sync fleet data

# Mirrors fleet_all.json from the private nexus-fleet-bot data repo into this
# repo at map/fleet_all.json, so the static map viewer can load it directly.
# Commits only when the upstream file actually changed.

on:
  schedule:
    # Hourly at :15 — the bot's sweep runs near the top of the hour, so this
    # picks up the freshest data without racing the commit.
    - cron: '15 * * * *'
  workflow_dispatch:    # allow manual runs from the Actions tab

permissions:
  contents: write       # only used to push the mirrored file back to this repo

concurrency:
  group: sync-fleet-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch fleet_all.json from private data repo
        env:
          # Fine-grained PAT issued by the data-repo owner with
          # Contents: Read-only on tmfink10/nextar-fleet-data. Stored as a
          # repository secret named FLEET_DATA_READ_TOKEN.
          TOKEN: ${{ secrets.FLEET_DATA_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::Secret FLEET_DATA_READ_TOKEN is not set."
            exit 1
          fi
          mkdir -p map
          # Use the Contents API with the `raw` media type to get the file bytes
          # directly (no base64 decode step needed).
          http=$(curl -sS -w '%{http_code}' -o map/fleet_all.json.new \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/tmfink10/nextar-fleet-data/contents/fleet_all.json?ref=main")
          if [ "$http" != "200" ]; then
            echo "::error::Fetch failed (HTTP $http)"
            head -c 400 map/fleet_all.json.new || true
            exit 1
          fi
          # Sanity check: must be valid JSON with the expected schema.
          jq -e '.schemaVersion and .players' map/fleet_all.json.new > /dev/null
          mv map/fleet_all.json.new map/fleet_all.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "nexstar-fleet-sync[bot]"
          git config user.email "actions@users.noreply.github.com"
          # Stage first so a brand-new (untracked) file shows up as a diff
          # against HEAD; `git diff --quiet` ignores untracked paths.
          git add map/fleet_all.json
          if git diff --cached --quiet -- map/fleet_all.json; then
            echo "No fleet changes since last sync; nothing to commit."
            exit 0
          fi
          generated=$(jq -r '.generatedAt // "unknown"' map/fleet_all.json)
          players=$(jq -r '.players | length' map/fleet_all.json)
          git commit -m "Sync fleet data (${generated}, ${players} player(s))"
          git push
